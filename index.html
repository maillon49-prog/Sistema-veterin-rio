<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Veterinário Cadastro e Login</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="inicial-container">
        <h1>Sistema Veterinário</h1>
        <p>Bem-vindo ao nosso sistema!</p>

        <div class="form-container">
            <input class="inputUsuario"type="text" id="nomeUsuario" placeholder="Digite seu nome">
            <input class="inputSenha" type="password" id="senhaUsuario" placeholder="Digite sua senha">

            <button class="btnLogin" id="botaoLogin">Login</button>
            <button class="btnCadastro" id="botaoCadastro">Cadastrar</button>

            <input class="senhaAdmin" type="password" id="senhaAdmin" placeholder="Digite a senha do administrador">
        </div>
    </div>


    <script src="script.js"></script>
    
</body>
</html>
